services:
  db:
    image: postgres:16-alpine
    container_name: cinesdelices_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     cinesdelices
      POSTGRES_PASSWORD: cinesdelices
      POSTGRES_DB:       cinesdelices
    ports:
      - "5432"      # accessible sur localhost:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinesdelices"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    name: cinesdelices_pgdata
