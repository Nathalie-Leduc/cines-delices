services:
  db:
    image: postgres:16-alpine
    container_name: cinedelices_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     cinedelices
      POSTGRES_PASSWORD: cinedelices
      POSTGRES_DB:       cinedelices
    ports:
      - "5433:5432"      # accessible sur localhost:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinedelices"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    name: cinedelices_pgdata