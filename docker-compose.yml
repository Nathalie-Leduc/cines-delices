services:
  api:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql://cinesdelices:cinesdelices@db:5432/cinesdelices
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npm run dev"

  client:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://api:3000
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: cinesdelices
      POSTGRES_PASSWORD: cinesdelices
      POSTGRES_DB: cinesdelices
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinesdelices"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  api_node_modules:
  client_node_modules:
  db_data:
