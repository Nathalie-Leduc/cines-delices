# =============================================================================
# CI/CD — Cinés Délices
# =============================================================================
#
# PIPELINE EN 4 JOBS :
#
#  push / PR    ┌─ 1. lint-client      ESLint sur le frontend
#   sur         ├─ 2. test-client      Vitest (tests unitaires)
#  toutes       └─ 3. lint-api         ESLint sur le backend
#  les branches
#
#  push sur    └─ 4. test-api-integration   Frappe la prod Railway
#  main/develop                              (tests d'intégration réels)
#
# SECRETS REQUIS (GitHub → Settings → Secrets → Actions) :
#
#   API_BASE_URL    URL de l'API de prod (ex: https://cines-delices-production.up.railway.app)
#   RAILWAY_TOKEN   Token Railway workspace (optionnel)
#
# =============================================================================

name: CI/CD — Cinés Délices

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Un seul run à la fois par branche/PR : annule les runs obsolètes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Force l'utilisation de Node 24 pour les actions GitHub (checkout, setup-node, etc.)
# Sans ça, GitHub utilise Node 20 par défaut → warning de dépréciation
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────
# JOB 1 — Lint Frontend (React / Vite)
# ─────────────────────────────────────────────────────────────
jobs:
  lint-client:
    name: 🎨 Lint — Client
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # FIX : pnpm/action-setup AVANT actions/setup-node
      # setup-node a besoin de pnpm déjà installé pour activer le cache
      - name: Installer pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Installer Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Lancer ESLint
        run: pnpm lint

# ─────────────────────────────────────────────────────────────
# JOB 2 — Tests unitaires Frontend (Vitest)
# ─────────────────────────────────────────────────────────────
  test-client:
    name: 🧪 Tests unitaires — Client (Vitest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Installer Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Lancer les tests Vitest
        run: pnpm test:run

# ─────────────────────────────────────────────────────────────
# JOB 3 — Lint Backend (Node.js / Express)
# ─────────────────────────────────────────────────────────────
  lint-api:
    name: 🔍 Lint — API
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Installer Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Lancer ESLint
        run: pnpm lint

# ─────────────────────────────────────────────────────────────
# JOB 4 — Tests d'intégration API (frappe la prod Railway)
# Lancé UNIQUEMENT sur push (pas sur les PRs).
# ─────────────────────────────────────────────────────────────
  test-api-integration:
    name: 🚀 Tests d'intégration — API (Railway)
    runs-on: ubuntu-latest

    needs: [lint-client, test-client, lint-api]
    if: github.event_name == 'push'

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Installer Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Attendre stabilisation Railway (30s)
        run: sleep 30

      - name: Lancer les tests d'intégration API
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'https://cines-delices-production.up.railway.app' }}
        run: node tests/test-api.js

      - name: Lancer les tests de sécurité API
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'https://cines-delices-production.up.railway.app' }}
        run: node tests/test-api-security.js
